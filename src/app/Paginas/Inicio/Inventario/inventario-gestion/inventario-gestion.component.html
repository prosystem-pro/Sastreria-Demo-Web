<app-spinner-global [visible]="Procesando"></app-spinner-global>

<!-- CONTENEDOR PRINCIPAL -->
<div *ngIf="!PanelCatalogoActivo" class="container mt-3" (click)="CerrarListasExternas($event)">

  <div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-8 col-xl-6">

      <!-- HEADER -->
      <div class="d-flex justify-content-between align-items-center p-2 bg-dark rounded-top">

        <div style="width:30px"></div>

        <h5 class="text-white m-0 text-center flex-grow-1">
          <i class="bi bi-box-seam"></i>
          {{ TituloFormulario }}
        </h5>

        <button class="btn btn-light btn-sm" style="width:30px;height:30px;border-radius:50%;"
          (click)="IrARuta('/inventario-listado'); $event.stopPropagation()">

          <i class="bi bi-x-lg"></i>

        </button>

      </div>

      <!-- CARD -->
      <div class="card shadow-sm rounded-top-0 border-top-0">

        <div class="card-body">

          <form (ngSubmit)="Guardar()">

            <div class="row">

              <!-- PRODUCTO -->
              <div class="col-12 mb-3">

                <label class="form-label d-flex align-items-center gap-2">
                  <i class="bi bi-box-seam"></i>
                  Producto
                </label>

                <input type="text" class="form-control form-control-sm" placeholder="Ingrese nombre del producto"
                  [(ngModel)]="Inventario.Producto" (input)="NormalizarTextoInput($event)" name="Producto" required
                  autocomplete="off">

              </div>

              <!-- TIPO PRODUCTO -->
              <ng-container *ngTemplateOutlet="selectBuscador;
                context:{
                  label:'Tipo Producto',
                  icon:'bi-boxes',
                  tipo:'TipoProducto',
                  lista:TipoProductos,
                  campo:'NombreTipoProducto',
                  mostrarBoton:false,
                  readonly:true
                }">
              </ng-container>

              <!-- MARCA -->
              <ng-container *ngTemplateOutlet="selectBuscador;
                context:{
                  label:'Marca',
                  icon:'bi-tag-fill',
                  tipo:'Marca',
                  lista:Marcas,
                  campo:'NombreMarca',
                  mostrarBoton:true
                }">
              </ng-container>

              <!-- ESTILO -->
              <ng-container *ngTemplateOutlet="selectBuscador;
                context:{
                  label:'Estilo',
                  icon:'bi-palette-fill',
                  tipo:'Estilo',
                  lista:Estilos,
                  campo:'NombreEstilo',
                  mostrarBoton:true
                }">
              </ng-container>

              <!-- TALLA -->
              <ng-container *ngTemplateOutlet="selectBuscador;
                context:{
                  label:'Talla',
                  icon:'bi-arrows-angle-expand',
                  tipo:'Talla',
                  lista:Tallas,
                  campo:'NombreTalla',
                  mostrarBoton:true
                }">
              </ng-container>

              <!-- COLOR -->
              <ng-container *ngTemplateOutlet="selectBuscador;
                context:{
                  label:'Color',
                  icon:'bi-circle-fill',
                  tipo:'Color',
                  lista:Colores,
                  campo:'NombreColor',
                  mostrarBoton:true
                }">
              </ng-container>

              <!-- CODIGO BARRA -->
              <div class="col-12 col-md-6 mb-3">

                <label class="form-label d-flex align-items-center gap-2">
                  <i class="bi bi-upc-scan"></i>
                  Código de Barra
                </label>

                <input type="text" class="form-control form-control-sm" [(ngModel)]="Inventario.CodigoBarra"
                  name="CodigoBarra" autocomplete="off">

              </div>

              <!-- PRECIO -->
              <div class="col-12 col-md-6 mb-3">

                <label class="form-label d-flex align-items-center gap-2">
                  <i class="bi bi-cash-coin"></i>
                  Precio
                </label>

                <input type="text" inputmode="decimal" class="form-control form-control-sm"
                  [(ngModel)]="Inventario.Precio" name="Precio" autocomplete="off"
                  (input)="NormalizarPrecioInput($event)">

              </div>

              <!-- STOCK -->
              <div class="col-12 col-md-6 mb-3">

                <label class="form-label d-flex align-items-center gap-2">
                  <i class="bi bi-box-fill"></i>
                  Stock
                </label>

                <input type="text" inputmode="decimal" class="form-control form-control-sm"
                  [(ngModel)]="Inventario.Stock" name="Stock" autocomplete="off" (input)="NormalizarStockInput($event)">

              </div>

              <!-- SWITCH ESTATUS SOLO EN EDICION -->
              <div class="col-12 mb-3" *ngIf="Inventario.CodigoInventario">

                <div class="d-flex align-items-center gap-2 ms-2">

                  <div class="form-check form-switch m-0" style="transform: scale(1.5);">

                    <input class="form-check-input" type="checkbox" [(ngModel)]="Inventario.EstatusSwitch"
                      name="EstatusSwitch" [ngClass]="Inventario.EstatusSwitch ? 'bg-dark' : 'bg-secondary'">

                  </div>

                  <span class="fw-semibold">
                    {{ Inventario.EstatusSwitch ? 'Desactivar' : 'Activar' }}
                  </span>

                </div>

              </div>

              <!-- BOTON GUARDAR -->
              <div class="col-12 text-center mt-3">

                <button class="btn btn-success btn-sm px-4">
                  Guardar
                </button>

              </div>

            </div>

          </form>

        </div>

      </div>

    </div>
  </div>
</div>

<!-- TEMPLATE SELECT -->
<ng-template #selectBuscador let-label="label" let-icon="icon" let-tipo="tipo" let-lista="lista" let-campo="campo"
  let-mostrarBoton="mostrarBoton" let-readonly="readonly">

  <div class="col-12 col-md-6 mb-3">

    <label class="form-label d-flex align-items-center gap-2">
      <i class="bi" [ngClass]="icon"></i>
      {{ label }}
    </label>

    <div class="d-flex gap-2">

      <!-- SELECT BUSCADOR -->
      <div class="position-relative flex-grow-1">

        <div class="input-group input-group-sm" [style.cursor]="readonly ? 'not-allowed' : 'pointer'"
          (click)="readonly ? null : AlternarListaBusqueda(tipo,$event)">

          <input type="text" class="form-control" [placeholder]="'Debe seleccionar ' + label.toLowerCase()"
            [(ngModel)]="Filtros[tipo]" [ngModelOptions]="{standalone:true}" autocomplete="off" [readonly]="readonly"
            [style.cursor]="readonly ? 'not-allowed' : 'text'" (keydown)="ValidarTexto($event)"
          (input)="FormatearTexto($event)">

          <span class="input-group-text bg-white">
            <i class="bi bi-caret-down-fill"></i>
          </span>

        </div>

        <!-- LISTA -->
        <ul class="list-group position-absolute w-100 shadow-sm"
          *ngIf="MostrarListas[tipo] && Filtrados(tipo,lista,campo).length > 0"
          style="z-index:1000;max-height:150px;overflow-y:auto;font-size:0.85rem">

          <li class="list-group-item list-group-item-action py-1" *ngFor="let item of Filtrados(tipo,lista,campo)"
            (mousedown)="Seleccionar(tipo,item)">

            {{ item[campo] }}

          </li>

        </ul>

      </div>

      <!-- BOTON NEGRO AGREGAR -->
      <button *ngIf="mostrarBoton" type="button"
        class="btn btn-dark btn-sm d-flex align-items-center justify-content-center" style="width:38px;height:32px"
        (click)="AgregarNuevo(tipo)">

        <i class="bi bi-plus-lg text-white"></i>

      </button>

    </div>

  </div>

</ng-template>

<!-- PANEL CATALOGO REUTILIZABLE -->
<div *ngIf="PanelCatalogoActivo" class="container mt-3">

  <div class="row justify-content-center">

    <div class="col-12 col-md-10 col-lg-8 col-xl-6">

      <div class="card shadow-sm">

        <!-- HEADER -->
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">

          <div class="d-flex align-items-center gap-2">

            <i class="bi" [ngClass]="IconoCatalogo(PanelCatalogoActivo)"></i>

            <strong>
              Gestión de {{ PanelCatalogoActivo }}
            </strong>

          </div>

          <button class="btn btn-light btn-sm" (click)="PanelCatalogoActivo = null">

            <i class="bi bi-x-lg"></i>

          </button>

        </div>

        <!-- BODY -->
        <div class="card-body">

          <!-- INPUT -->
          <div class="row mb-3">

            <div class="col-8">

              <label class="form-label fw-bold">
                Nombre {{ PanelCatalogoActivo }}
              </label>

              <input type="text" class="form-control form-control-sm" placeholder="Ingresar"
                [(ngModel)]="NombreNuevoCatalogo" (keydown)="ValidarTexto($event)" (input)="FormatearTexto($event)">

            </div>

            <div class="col-4 d-flex align-items-end">

              <button type="button"
                class="btn btn-success btn-sm w-100 d-flex align-items-center justify-content-center gap-2"
                (click)="GuardarCatalogo()">
                <i class="bi" [ngClass]="ModoEdicion ? 'bi-pencil-square' : 'bi-plus-square'"></i>

                {{ ModoEdicion ? 'Actualizar' : 'Agregar' }}

              </button>

            </div>

          </div>

          <!-- LISTADO LIMPIO -->
          <div class="mt-3">

            <!-- HEADER -->
            <div class="d-flex align-items-center border-bottom pb-2 fw-bold text-muted">

              <div class="flex-grow-1">
                Nombre
              </div>

              <div style="width:60px; text-align:center;">
                Acción
              </div>

            </div>

            <!-- REGISTROS -->
            <div *ngFor="let item of ListaCatalogoPanel" class="d-flex align-items-center border-bottom py-2">

              <div class="flex-grow-1">

                {{ NombreCatalogo(item) }}

              </div>

              <div style="width:60px; text-align:center;">

                <button class="btn btn-sm p-0" (click)="EditarCatalogo(item)">

                  <i class="bi bi-pencil-square"></i>

                </button>

              </div>

            </div>

            <!-- SIN DATOS -->
            <div *ngIf="ListaCatalogoPanel.length === 0" class="text-center text-muted py-3">

              No hay registros

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
