<app-spinner-global [visible]="Procesando"></app-spinner-global>
<div class="container mt-3">

    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-9 col-xl-7">

            <!-- HEADER -->
            <div *ngIf="!EsModal" class="d-flex justify-content-between align-items-center p-2 bg-dark rounded mb-0">
                <h5 class="text-white m-0 text-center w-100">
                    {{ Codigo ? 'Editar Cliente' : 'Crear Cliente' }}
                </h5>

                <button class="btn btn-light btn-sm" (click)="IrARuta('/cliente')"
                    style="width:30px;height:30px;border-radius:50%;">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>

            <!-- CARD principal pegado al header -->
            <div class="card shadow-sm" style="margin-top:0;">
                <div class="card-body p-3">

                    <!-- FORM -->
                    <form (ngSubmit)="Guardar()">

                        <div class="row">

                            <!-- NIT -->
                            <!-- NIT -->
                            <div class="col-12 col-md-6 mb-3">
                                <label class="form-label d-flex align-items-center gap-2">
                                    <i class="bi bi-upc-scan"></i>
                                    NIT
                                </label>

                                <input type="text" class="form-control form-control-sm"
                                    placeholder="Ingrese NIT del cliente" [(ngModel)]="Cliente.NIT" name="NIT"
                                    inputmode="numeric" pattern="[0-9]*" (input)="SoloNumerosNIT($event)" maxlength="15"
                                    required>
                            </div>

                            <!-- CELULAR -->
                            <div class="col-12 col-md-6 mb-3">
                                <label class="form-label d-flex align-items-center gap-2">
                                    <i class="bi bi-telephone-fill"></i>
                                    Celular <span style="color: red;">*</span>
                                </label>

                                <input type="text" class="form-control form-control-sm"
                                    placeholder="Ingrese número de celular" [(ngModel)]="Cliente.Celular" name="Celular"
                                    inputmode="numeric" pattern="[0-9]*" maxlength="8" (input)="SoloNumeros($event)" />
                            </div>

                            <!-- CLIENTE -->
                            <div class="col-12 mb-3">
                                <label class="form-label d-flex align-items-center gap-2">
                                    <i class="bi bi-person-fill"></i>
                                    Cliente <span style="color: red;">*</span>
                                </label>

                                <input type="text" class="form-control form-control-sm"
                                    placeholder="Ingrese nombre del cliente" [(ngModel)]="Cliente.NombreCliente"
                                    name="NombreCliente" required>
                            </div>

                            <!-- DIRECCION -->
                            <div class="col-12 mb-3">
                                <label class="form-label d-flex align-items-center gap-2">
                                    <i class="bi bi-geo-alt-fill"></i>
                                    Dirección <span style="color: red;">*</span>
                                </label>

                                <input type="text" class="form-control form-control-sm"
                                    placeholder="Ingrese dirección del cliente" [(ngModel)]="Cliente.Direccion"
                                    name="Direccion">
                            </div>

                            <!-- BOTON -->
                            <div class="col-12 col-md-6 mx-auto mt-4 text-center">
                                <button class="btn btn-success btn-sm px-4" type="submit">
                                    <i class="bi bi-save-fill me-1"></i>
                                    {{ Codigo ? 'Actualizar Cliente' : 'Guardar Cliente' }}
                                </button>
                            </div>

                        </div>

                    </form>

                </div>
            </div>
            <!-- FIN CARD -->

        </div>
    </div>

</div>
