<app-spinner-global [visible]="Procesando"></app-spinner-global>
<div class="container mt-2">

  <!-- TÍTULO -->
  <div class="d-flex justify-content-between align-items-center mb-2 p-2 bg-dark rounded-3">
    <h5 class="text-white m-0" style="font-size: 1rem;">Clientes</h5>
    <button (click)="IrARuta(ObtenerRutaMenu())"
      class="btn btn-light btn-sm d-flex align-items-center justify-content-center p-0"
      style="width:30px;height:30px;border-radius:50%;">
      <i class="bi bi-x-lg" style="font-size:0.8rem;"></i>
    </button>
  </div>

  <!-- BOTÓN NUEVO -->
  <div class="mb-2 text-center">
    <button (click)="IrARuta('/gestion-cliente')"
      class="btn btn-sm d-flex align-items-center justify-content-center mx-auto"
      style="background-color:#28a745;color:#fff;font-size:0.85rem;">
      <i class="bi bi-file-plus-fill me-1"></i> Nuevo Cliente
    </button>
  </div>

  <!-- BUSCADOR -->
  <div class="d-flex gap-2 mb-2">
    <div class="input-group input-group-sm border border-dark rounded">
      <input type="text" class="form-control border-0" placeholder="Buscar clientes" [(ngModel)]="Busqueda"
        (input)="FiltrarClientes()">
      <span class="input-group-text bg-transparent border-0">
        <i class="bi bi-search"></i>
      </span>
    </div>

    <button class="btn btn-sm btn-outline-dark d-flex align-items-center" (click)="CambiarOrden()"
      style="white-space:nowrap;">
      <i class="bi me-1" [ngClass]="Orden === 'asc' ? 'bi-sort-alpha-down' : 'bi-sort-alpha-up'">
      </i>
      {{ Orden === 'asc' ? 'A-Z' : 'Z-A' }}
    </button>
  </div>

  <!-- CLIENTES -->
  <div class="row g-2">
    <div *ngFor="let Cliente of ClientesFiltrados" class="col-md-6">
      <div class="card fila-deslizable" (dblclick)="IrAGestion(Cliente.CodigoCliente)"
        (mousedown)="IniciarArrastre($event, Cliente)" (mousemove)="DuranteArrastre($event)"
        (mouseup)="FinalizarArrastre()" (mouseleave)="FinalizarArrastre()"
        (touchstart)="IniciarArrastre($event, Cliente)" (touchmove)="DuranteArrastre($event)"
        (touchend)="FinalizarArrastre()">

        <div class="fila-contenido d-flex">
          <div class="d-flex align-items-start justify-content-center bg-white rounded-start"
            style="width:60px;min-height:65px;padding-top:6px;">
            <div class="d-flex align-items-center justify-content-center rounded-circle bg-black text-white fw-bold"
              style="width:38px;height:38px;font-size:0.9rem;">
              {{ ObtenerIniciales(Cliente.NombreCliente) }}
            </div>
          </div>

          <div class="card-body p-2 position-relative">
            <h6 class="card-title mb-0" style="font-size:0.9rem;">
              {{ Cliente.NombreCliente }}
            </h6>
            <p class="card-text text-muted mb-0" style="font-size:0.75rem;">
              NIT: {{ Cliente.NIT }} | Cel: {{ Cliente.Celular }}
            </p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- MENSAJES -->

  <div *ngIf="!Procesando && ClientesFiltrados.length === 0" class="alert alert-warning mt-2">
    No hay clientes registrados.
  </div>

  <div *ngIf="Error" class="alert alert-danger mt-2">
    {{ Error }}
  </div>

</div>
