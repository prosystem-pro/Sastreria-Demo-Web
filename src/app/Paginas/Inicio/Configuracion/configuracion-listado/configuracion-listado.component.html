<app-spinner-global [visible]="Procesando"></app-spinner-global>

<div class="container mt-2">
    <!-- TÍTULO DINÁMICO -->
    <div class="d-flex justify-content-between align-items-center mb-2 p-2 bg-dark rounded-3">
        <h5 class="text-white m-0" style="font-size: 1rem;">
            {{ MostrandoEliminados ? 'Productos Eliminados' : 'Productos de confección' }}
        </h5>

        <button class="btn btn-light btn-sm d-flex align-items-center justify-content-center p-0"
            style="width:30px;height:30px;border-radius:50%;"
            (click)="MostrandoEliminados ? MostrarActivos() : IrRuta('menu')">
            <i class="bi bi-x-lg" style="font-size:0.8rem;"></i>
        </button>
    </div>
    <!-- BOTONES NUEVO Y ELIMINADOS -->
    <div class="mb-2 d-flex gap-2 justify-content-center">
        <!-- Botón Crear producto / Restaurar -->
        <button *ngIf="!MostrandoEliminados" class="btn d-flex align-items-center justify-content-center flex-grow-1"
            style="background-color:#28a745; color:#fff; font-size:0.9rem; padding:0.5rem 0.75rem; height:2.2rem;"
            (click)="IrRuta('configuracion-gestion')">
            <span
                style="display:flex; align-items:center; justify-content:center; width:1.3rem; height:1.3rem; background:#fff; border-radius:0.25rem; margin-right:0.5rem;">
                <i class="bi bi-plus" style="color:#28a745; font-size:0.9rem;"></i>
            </span>
            Crear producto
        </button>

        <!-- Botón Restaurar solo en modo eliminados -->
        <button *ngIf="MostrandoEliminados" class="btn d-flex align-items-center justify-content-center"
            style="background-color:#1d9a12; color:#fff; font-size:0.9rem; padding:0.5rem 0.75rem; height:2.2rem; width:50%;"
            (click)="RestaurarSeleccionadosConfirmacion()">
            <span
                style="display:flex; align-items:center; justify-content:center; width:1.3rem; height:1.3rem; background:#fff; border-radius:0.25rem; margin-right:0.5rem;">
                <i class="bi bi-arrow-clockwise" style="color:#00ad23; font-size:0.9rem;"></i>
            </span>
            Restaurar
        </button>

        <!-- Botón Productos Eliminados -->
        <button *ngIf="!MostrandoEliminados" class="btn d-flex align-items-center justify-content-center flex-grow-1"
            style="background-color:#dc3545; color:#fff; font-size:0.9rem; padding:0.5rem 0.75rem; height:2.2rem;"
            (click)="MostrarEliminados()">
            <span
                style="display:flex; align-items:center; justify-content:center; width:1.3rem; height:1.3rem; background:#fff; border-radius:0.25rem; margin-right:0.5rem;">
                <i class="bi bi-exclamation-triangle-fill" style="color:#dc3545; font-size:0.9rem;"></i>
            </span>
            Productos eliminados
        </button>
    </div>
    <!-- BUSCADOR -->
    <div class="input-group input-group-sm border border-dark rounded mb-2">
        <input type="text" class="form-control border-0" placeholder="Buscar producto" [(ngModel)]="Busqueda"
            (input)="FiltrarInventario()">
        <span class="input-group-text bg-transparent border-0">
            <i class="bi bi-search"></i>
        </span>
    </div>


    <!-- INVENTARIO AGRUPADO - DISEÑO 1 REFINADO -->
    <div class="row g-2">

        <ng-container *ngFor="let producto of InventarioFiltrado; let i = index">

            <div class="col-12" *ngIf="producto?.Variaciones?.length > 0">

                <div class="card shadow-sm rounded-3" #productoCard>

                    <!-- HEADER PRODUCTO -->
                    <div class="card-body py-2 px-3 d-flex justify-content-between align-items-center"
                        style="cursor:pointer" (click)="ToggleProducto(i)">

                        <div class="d-flex align-items-center gap-2">
                            <span style="font-size:1.2rem;">📁</span>

                            <h6 class="m-0 fw-bold" style="font-size:0.95rem;">
                                {{ producto.Producto }}
                            </h6>

                            <span class="badge bg-secondary">
                                {{ producto.Variaciones.length }}
                            </span>
                        </div>

                        <div>
                            <img src="Acordeon.png" style="width:24px; height:24px;">
                        </div>

                    </div>

                    <!-- VARIACIONES -->
                    <div *ngIf="ProductoExpandido === i || ProductoExpandido === -1" class="px-3 pb-3">

                        <!-- BLOQUE INSERTAR VARIACION -->
                        <div *ngIf="!MostrandoEliminados"
                            class="p-3 mb-3 rounded-3 bg-light border shadow-sm d-flex gap-2 align-items-center">

                            <!-- Tipo Tela -->
                            <select class="form-select form-select-sm" [(ngModel)]="NuevaVariacion[i].TipoTela"
                                (change)="CargarTelasPorTipo(NuevaVariacion[i].TipoTela)" style="width:40%"
                                [disabled]="TiposTela.length === 0">

                                <option value="">-- Tipo tela --</option>

                                <option *ngFor="let tipo of TiposTela" [value]="tipo.CodigoTipoTela">
                                    {{ tipo.NombreTipoTela }}
                                </option>

                            </select>

                            <!-- Nombre Tela -->
                            <select class="form-select form-select-sm" [(ngModel)]="NuevaVariacion[i].Tela"
                                style="width:40%" [disabled]="Telas.length === 0">

                                <option value="">-- Nombre tela --</option>

                                <option *ngFor="let tela of Telas" [value]="tela.CodigoTela">
                                    {{ tela.NombreTela }}
                                </option>

                            </select>

                            <input type="text" class="form-control form-control-sm" placeholder="-- Precio --"
                                [(ngModel)]="NuevaVariacion[i].Precio" (input)="NormalizarPrecio($event, i)"
                                style="width:20%">

                            <!-- Botón -->
                            <button class="btn btn-dark btn-sm" style="width:40px; height:35px;"
                                (click)="AgregarVariacion(i)">
                                +
                            </button>

                        </div>

                        <!-- ENCABEZADO -->
                        <div class="d-flex text-muted small border-bottom pb-1 mb-2">

                            <div style="width:40%">
                                Tipo tela
                            </div>

                            <div style="width:40%">
                                Nombre tela
                            </div>

                            <div style="width:15%" class="text-end">
                                Precio
                            </div>

                            <div *ngIf="MostrandoEliminados" style="width:10%; display:flex; justify-content:end;">
                                ✔
                            </div>

                        </div>

                        <!-- LISTADO VARIACIONES -->
                        <ng-container *ngFor="let variacion of producto.Variaciones; let j = index">

                            <div *ngIf="variacion?.CodigoInventario"
                                class="d-flex align-items-center py-1 px-2 rounded-2 hover-shadow"
                                (mousedown)="MostrandoEliminados ? null : IniciarArrastre($event, i, j)"
                                (touchstart)="MostrandoEliminados ? null : IniciarArrastre($event, i, j)"
                                (dblclick)="MostrandoEliminados ? null : AbrirInventarioGestion(variacion.CodigoInventario)"
                                (touchend)="MostrandoEliminados ? null : DetectarDobleTap(variacion.CodigoInventario)">

                                <div style="width:40%; font-size:0.85rem;">
                                    {{ variacion.TipoTela }}
                                </div>

                                <div style="width:40%; font-size:0.85rem;">
                                    {{ variacion.Tela }}
                                </div>

                                <div style="width:15%; font-size:0.85rem;" class="text-end text-success fw-bold">
                                    Q {{ variacion.Precio }}
                                </div>

                                <div *ngIf="MostrandoEliminados" style="width:10%; display:flex; justify-content:end;">

                                    <input type="checkbox" class="form-check-input"
                                        style="transform: scale(1.3); border:2px solid #333;"
                                        (change)="ToggleSeleccion(variacion.CodigoInventario, $event)">

                                </div>

                            </div>

                        </ng-container>

                    </div>

                </div>

            </div>

        </ng-container>

    </div>
    <!-- MENSAJES -->

    <div *ngIf="!Procesando && InventarioFiltrado.length === 0" class="alert alert-warning mt-2">
        No hay productos en inventario.
    </div>

    <div *ngIf="Error" class="alert alert-danger mt-2">
        {{ Error }}
    </div>

</div>
