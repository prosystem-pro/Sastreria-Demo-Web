<!-- HEADER (BOTÓN) -->
<div class="container mt-3">
  <div class="d-flex justify-content-center">
    <div class="bg-dark text-white d-flex align-items-center justify-content-center gap-2 px-4 py-3 rounded 
             w-100 w-md-75 w-lg-50" role="button">
      <i class="bi bi-house-fill fs-4 fs-md-3"></i>
      <span class="fw-semibold fs-5 fs-md-4">Menú</span>
    </div>
  </div>
</div>
<!-- CARDS -->
<div class="container mt-4">
  <div class="row justify-content-center g-4">

    <!-- CLIENTE -->
    <div class="col-5 col-sm-4 col-md-4 col-lg-3">
      <div class="card bg-dark text-white text-center border-0 h-100 py-4 py-md-5 rounded"
        style="cursor: pointer; transition: transform 0.2s;" (click)="IrARuta('/cliente')"
        (mouseenter)="hover = 'cliente'" (mouseleave)="hover = ''"
        [ngStyle]="hover === 'cliente' ? {'transform': 'translateY(-5px)'} : {}">
        <div class="d-flex flex-column justify-content-center align-items-center">
          <i class="bi bi-person-fill fs-2 fs-md-1 mb-2 mb-md-3"></i>
          <span class="fs-6 fs-md-5">Cliente</span>
        </div>
      </div>
    </div>

    <!-- PEDIDOS -->
    <div class="col-5 col-sm-4 col-md-4 col-lg-3">
      <div class="card bg-dark text-white text-center border-0 h-100 py-4 py-md-5 rounded"
        style="cursor: pointer; transition: transform 0.2s;" (click)="IrARuta('/pedido-listado')"
        (mouseenter)="hover = 'pedido'" (mouseleave)="hover = ''"
        [ngStyle]="hover === 'pedido' ? {'transform': 'translateY(-5px)'} : {}">
        <div class="d-flex flex-column justify-content-center align-items-center">
          <i class="bi bi-table fs-2 fs-md-1 mb-2 mb-md-3"></i>
          <span class="fs-6 fs-md-5">Pedidos</span>
        </div>
      </div>
    </div>

    <!-- HISTORIAL -->
    <div class="col-5 col-sm-4 col-md-4 col-lg-3">
      <div class="card bg-dark text-white text-center border-0 h-100 py-4 py-md-5 rounded"
        style="cursor: pointer; transition: transform 0.2s;" (click)="IrARuta('/pedido-historial-listado')"
        (mouseenter)="hover = 'historial'" (mouseleave)="hover = ''"
        [ngStyle]="hover === 'historial' ? {'transform': 'translateY(-5px)'} : {}">
        <div class="d-flex flex-column justify-content-center align-items-center">
          <i class="bi bi-journal-plus fs-2 fs-md-1 mb-2 mb-md-3"></i>
          <span class="fs-6 fs-md-5">Historial de pedidos</span>
        </div>
      </div>
    </div>

  </div>
</div>
