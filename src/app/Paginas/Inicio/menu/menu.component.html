<div class="container py-3">

  <!-- TITULO -->
  <div class="card bg-dark text-white text-center shadow border-0 mb-4">
    <div class="card-body py-2">
      <i class="bi bi-house-fill fs-4 me-2"></i>
      <span class="fs-5 fw-bold">Menú</span>
    </div>
  </div>

  <!-- OPCIONES -->
  <div class="row g-3">

    <div
      class="col-6 col-md-4 col-lg-3"
      *ngFor="let opcion of opciones">

      <div
        class="card bg-dark text-white text-center shadow h-100 border-0"
        [routerLink]="opcion.ruta"
        style="cursor:pointer;">

        <div class="card-body d-flex flex-column justify-content-center py-3">

          <i class="bi {{opcion.icono}} fs-3 mb-2"></i>

          <h6 class="fw-bold mb-0 small">
            {{opcion.nombre}}
          </h6>

        </div>

      </div>

    </div>

  </div>

</div>

<div class="col-6 col-md-4 col-lg-3">

</div>
