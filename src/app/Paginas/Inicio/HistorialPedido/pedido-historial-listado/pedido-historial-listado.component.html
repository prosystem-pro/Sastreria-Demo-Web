<app-spinner-global [visible]="Procesando"></app-spinner-global>

<div class="container mt-2">

    <!-- TÍTULO -->
    <div class="d-flex justify-content-between align-items-center mb-2 p-2 bg-dark rounded-3">
        <h5 class="text-white m-0" style="font-size: 1rem;">
            Historial de Pedidos
        </h5>

        <button (click)="IrARuta(ObtenerRutaMenu())"
            class="btn btn-light btn-sm d-flex align-items-center justify-content-center p-0"
            style="width:30px;height:30px;border-radius:50%;">
            <i class="bi bi-x-lg" style="font-size:0.8rem;"></i>
        </button>
    </div>

    <!-- FILTRO FECHAS -->
    <div class="row g-2 mb-2">

        <!-- FECHA INICIO -->
        <div class="col position-relative">

            <input type="text" class="form-control form-control-sm border-dark pe-5" [value]="FechaInicioFormateada"
                placeholder="dd/MM/yyyy" readonly (click)="AbrirDatePicker('inicio')" style="cursor: pointer;">

            <span class="position-absolute top-50 end-0 translate-middle-y me-2" style="cursor: pointer;"
                (click)="AbrirDatePicker('inicio')">
                <i class="bi bi-calendar3"></i>
            </span>

            <input #dateInicio type="date" class="position-absolute top-0 start-0 w-100 h-100 opacity-0"
                [(ngModel)]="FechaInicio" (change)="OnFechaInicioChange()">

        </div>

        <!-- FECHA FIN -->
        <div class="col position-relative">

            <input type="text" class="form-control form-control-sm border-dark pe-5" [value]="FechaFinFormateada"
                placeholder="dd/MM/yyyy" readonly (click)="AbrirDatePicker('fin')" style="cursor: pointer;">

            <span class="position-absolute top-50 end-0 translate-middle-y me-2" style="cursor: pointer;"
                (click)="AbrirDatePicker('fin')">
                <i class="bi bi-calendar3"></i>
            </span>

            <input #dateFin type="date" class="position-absolute top-0 start-0 w-100 h-100 opacity-0"
                [(ngModel)]="FechaFin" (change)="OnFechaFinChange()">

        </div>

    </div>

    <!-- BUSCADOR -->
    <div class="input-group input-group-sm border border-dark rounded mb-2">

        <input type="text" class="form-control border-0" placeholder="Buscar pedidos" [(ngModel)]="Busqueda"
            (input)="FiltrarPedidos()">

        <span class="input-group-text bg-transparent border-0">
            <i class="bi bi-search"></i>
        </span>

    </div>

    <!-- FILTROS -->
    <div class="mb-2">

        <div class="d-flex justify-content-between align-items-center border rounded p-1 bg-white">

            <button class="btn btn-sm flex-fill" [class.btn-dark]="CampoOrden === 'NombreCliente'"
                (click)="OrdenarPor('NombreCliente')">
                Nombre
                <i class="bi ms-1" [ngClass]="ObtenerIconoOrden('NombreCliente')"></i>
            </button>

            <button class="btn btn-sm flex-fill" [class.btn-dark]="CampoOrden === 'FechaCreacion'"
                (click)="OrdenarPor('FechaCreacion')">
                Creado
                <i class="bi ms-1" [ngClass]="ObtenerIconoOrden('FechaCreacion')"></i>
            </button>

            <button class="btn btn-sm flex-fill" [class.btn-dark]="CampoOrden === 'FechaEntrega'"
                (click)="OrdenarPor('FechaEntrega')">
                Entrega
                <i class="bi ms-1" [ngClass]="ObtenerIconoOrden('FechaEntrega')"></i>
            </button>

            <button class="btn btn-sm flex-fill" [class.btn-dark]="CampoOrden === 'Total'"
                (click)="OrdenarPor('Total')">
                Monto
                <i class="bi ms-1" [ngClass]="ObtenerIconoOrden('Total')"></i>
            </button>

        </div>

    </div>

    <!-- PEDIDOS ENTREGADOS -->
    <div class="row g-2">

        <div *ngFor="let Pedido of PedidosFiltrados" class="col-md-6">

            <div class="card" (dblclick)="IrAHistorial(Pedido.CodigoPedido)" style="cursor:pointer;">
                <!-- BOTÓN DE DESCARGAR PDF -->
                <button (click)="DescargarPDF(Pedido.CodigoPedido)"
                    *ngIf="EsSuperAdmin() || (EsOficial() && VerOtros === false)"
                    class="btn btn-sm btn-outline-dark position-absolute top-0 end-0 m-1 p-1" title="Descargar PDF">
                    <i class="bi bi-file-earmark-pdf-fill"></i>
                </button>
                <div class="card-body p-2">

                    <h6 class="fw-bold mb-1" style="font-size:0.9rem;">
                        {{ Pedido.NombreCliente }}
                        <span class="text-muted fw-normal" *ngIf="EsAsociada() || EsSuperAdmin()">
                            | {{ Pedido.NombreEmpresa }}
                        </span>
                    </h6>

                    <div class="text-muted mb-1" style="font-size:0.75rem;">
                        Creado: {{ Pedido.FechaCreacion }}
                        |
                        Entrega: {{ Pedido.FechaEntrega }}
                        |
                        Monto: {{ Pedido.Total | currency:'GTQ' }}
                    </div>

                    <div class="d-flex align-items-center gap-2">

                        <button
                            class="btn btn-sm btn-success text-white d-flex align-items-center gap-1 px-2 py-0 fw-bold"
                            style="font-size:0.6rem;">

                            <i class="bi bi-check-circle fs-6"></i>
                            {{ Pedido.NombreEstatus }}

                        </button>

                        <span class="text-muted small">
                            Atendió: {{ Pedido.Usuario }}
                        </span>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- MENSAJES -->
    <div *ngIf="Cargando" class="alert alert-info mt-2">
        Cargando historial...
    </div>

    <div *ngIf="!Cargando && PedidosFiltrados.length === 0" class="alert alert-warning mt-2">
        No hay pedidos entregados.
    </div>

    <div *ngIf="Error" class="alert alert-danger mt-2">
        {{ Error }}
    </div>

</div>
